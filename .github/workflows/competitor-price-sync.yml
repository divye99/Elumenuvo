name: Competitor price sync (multi-source)

# Runs on the 1st of every month at 03:00 UTC, and can be triggered by hand
# from the Actions tab (Run workflow). For every ENABLED source in
# competitor_sources with a fetcher (Vashi, Crompton, Legrand, Havells),
# refetches each mapped product's price and writes ₹1-under suggestions to
# Supabase for the admin to review. All feeds are public — no login secrets.
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install deps
        # ws provides a WebSocket for supabase-js on Node < 22 (the script also
        # polyfills globalThis.WebSocket from it); harmless on Node 22+.
        run: npm install @supabase/supabase-js@2 ws --no-save

      - name: Run competitor price sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional — the pincode Vashi net prices are quoted for (default 400001).
          VASHI_PINCODE: ${{ secrets.VASHI_PINCODE }}
        run: node scripts/competitor-sync.mjs
